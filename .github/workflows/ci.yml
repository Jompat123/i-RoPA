name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - name: Install & lint
        run: |
          cd Frontend
          npm ci
          npm run lint
      - name: Unit tests (Vitest)
        run: |
          cd Frontend
          npm run test:run

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iropa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iropa?schema=public
      JWT_SECRET: ci-test-jwt
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/package-lock.json
      - name: Install & validate Prisma schema
        run: |
          cd Backend
          npm ci
          npm run prisma:validate
      - name: Migrate, seed, API tests
        run: |
          cd Backend
          npm run db:migrate
          npm run db:seed
          npm run test:run
